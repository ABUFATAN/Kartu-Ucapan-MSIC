<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | Kartu Ucapan MSIC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="home-page">
      <section class="hero-shell" aria-label="Header kartu ucapan MSIC">
        <img class="brand-lockup" src="assets/image-2-branding-msic.png" alt="Branding Mutiara Sunnah Islamic School" />

        <img class="hero-illustration" src="assets/image-1-ilustrasi-idul-fitri.png" alt="Ilustrasi Idul Fitri" />
      </section>

      <section class="template-section" aria-label="Pilih template kartu">
        <div class="template-list" id="templateList">
          <button type="button" class="template-card selected" aria-label="Template kartu 1">
            <img src="assets/image-template-kartu-1.png" alt="Template kartu 1" />
          </button>
          <button type="button" class="template-card" aria-label="Template kartu 2">
            <img src="assets/image-template-kartu-2.png" alt="Template kartu 2" />
          </button>
          <button type="button" class="template-card" aria-label="Template kartu 3">
            <img src="assets/image-template-kartu-3.png" alt="Template kartu 3" />
          </button>
          <button type="button" class="template-card" aria-label="Template kartu 4">
            <img src="assets/image-template-kartu-4.png" alt="Template kartu 4" />
          </button>
        </div>

        <button type="button" class="ok-button" id="okButton">OK</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
